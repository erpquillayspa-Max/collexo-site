# ────────────────────────────────────────────────
# Collexo — World Cup 2026 Daily News Agent
# Runs every day at 8am UTC (4am ET / 5am Chile)
# ────────────────────────────────────────────────
name: World Cup News Agent

on:
  schedule:
    - cron: '0 8 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create public dir
        run: mkdir -p public

      - name: Write agent script
        run: |
          cat > agent.js << 'JSEOF'
          const https = require('https');
          const fs = require('fs');

          async function fetchNews() {
            const systemPrompt = "You are a World Cup 2026 news aggregator for Collexo. Search for the 6 most recent news about FIFA World Cup 2026 or Panini sticker album 2026. Return ONLY a valid JSON array with 6 objects, no markdown: [{\"category\":\"cat\",\"title\":\"title\",\"desc\":\"desc\",\"source\":\"Source Date\",\"tag\":\"Album|Market|World Cup|Qualifying|Historic|Result|Match\",\"icon\":\"one emoji\"}]";
            const body = JSON.stringify({
              model: 'claude-sonnet-4-5',
              max_tokens: 1500,
              tools: [{ type: 'web_search_20250305', name: 'web_search' }],
              system: systemPrompt,
              messages: [{
                role: 'user',
                content: 'Today is ' + new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) + '. Find 6 recent FIFA World Cup 2026 and Panini sticker news stories. Return JSON only.'
              }]
            });

            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.anthropic.com',
                path: '/v1/messages',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01'
                }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const parsed = JSON.parse(data);
                    const text = parsed.content.filter(b => b.type === 'text').map(b => b.text).join('');
                    const clean = text.replace(/```json|```/g, '').trim();
                    resolve(JSON.parse(clean));
                  } catch (e) {
                    console.error('Raw response:', data.slice(0, 500));
                    reject(new Error('Parse error: ' + e.message));
                  }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function fetchResults() {
            if (!process.env.FOOTBALL_API_KEY) return null;
            return new Promise((resolve) => {
              const req = https.request({
                hostname: 'api.football-data.org',
                path: '/v4/competitions/WC/matches?status=FINISHED&limit=5',
                method: 'GET',
                headers: { 'X-Auth-Token': process.env.FOOTBALL_API_KEY }
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); } catch (e) { resolve(null); }
                });
              });
              req.on('error', () => resolve(null));
              req.end();
            });
          }

          async function main() {
            console.log('Fetching news from Claude AI...');
            const [stories, results] = await Promise.all([fetchNews(), fetchResults()]);
            console.log('Got ' + stories.length + ' news stories');

            const timestamp = new Date().toISOString();
            const outputData = {
              updated: timestamp,
              stories: stories,
              results: (results && results.matches) ? results.matches.slice(0, 5) : []
            };

            fs.mkdirSync('public', { recursive: true });
            fs.writeFileSync('public/wc2026-data.json', JSON.stringify(outputData, null, 2));
            console.log('Done! Wrote public/wc2026-data.json');
          }

          main().catch(e => {
            console.error('Error:', e.message);
            process.exit(1);
          });
          JSEOF

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node agent.js

      - name: Commit and push
        run: |
          git config user.name "Collexo Bot"
          git config user.email "bot@collexo.app"
          git add public/wc2026-data.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily World Cup news update - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Summary
        run: |
          echo "## World Cup News Updated" >> $GITHUB_STEP_SUMMARY
          echo "- Run time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Output: public/wc2026-data.json" >> $GITHUB_STEP_SUMMARY
